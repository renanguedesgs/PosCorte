version: '3.8'

services:
  poscorte-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION:-}
      Jwt__Key: ${JWT_SECRET:-dev-secret-change-in-production-32chars-min}
      Asaas__Enabled: "false"
      Cors__AllowedOrigins__0: http://localhost:5197
      Cors__AllowedOrigins__1: http://localhost:8081
    volumes:
      - api-logs:/app/logs

  poscorte-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    ports:
      - "8081:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ApiBaseUrl: http://poscorte-api:8080
    depends_on:
      - poscorte-api

volumes:
  api-logs:
